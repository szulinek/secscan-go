[domusspolka]
user = $pool
group = $pool
listen = /usr/local/php83/sockets/$pool.sock
listen.mode = 0660
pm = ondemand
pm.max_children = 40
php_admin_value[mail.log] = /home/user/.php/php-mail.log
php_value[open_basedir] = /home/user/domains:/tmp
access.log = /var/log/php-fpm/access.log

[global]
error_log = /dev/null

[main]
listen = /tmp/main.sock
