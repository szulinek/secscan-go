[www]
user = admin
group = admin
listen = /usr/local/php83/sockets/admin.sock
listen.mode = 0660
pm = ondemand
pm.max_children = 40
access.log = /var/log/php-fpm/access.log
php_admin_value[error_log] = /var/log/php83/www-error.log
php_admin_value[mail.log] = /home/admin/.php/php-mail.log
security.limit_extensions = .php
